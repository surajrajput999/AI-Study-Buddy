<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Powered Study Buddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 AI-Powered Study Buddy</h1>
        <p>Understand complex concepts and generate flashcards on demand using AI!</p>
        
        <textarea id="inputText" placeholder="Paste your lecture notes or topic text here..."></textarea>
        
        <div class="btn-group">
            <button id="summarizeBtn">Summarize Text</button>
            <button id="flashcardBtn">Generate Flashcards</button>
        </div>

        <div id="outputBox" class="output-box">
            <h3>Result:</h3>
            <p id="outputText">Your AI-generated content will appear here...</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
